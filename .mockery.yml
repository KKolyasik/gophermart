all: true
dir: '{{.InterfaceDir}}/mocks'
filename: "{{.InterfaceName}}.go"
formatter: goimports
formatter-options:
  goimports:
    all-errors: false
    comments: true
    format-only: true
    fragment: false
    local-prefix: ""
    tab-indent: true
    tab-width: 8
generate: true
include-auto-generated: false
log-level: info
structname: '{{.Mock}}{{.InterfaceName}}'
pkgname: "mocks"
recursive: false
require-template-schema-exists: true
template: testify
template-schema: '{{.Template}}.schema.json'
packages:
  github.com/Kkolyasik/gophermart/internal/handler/auth:
  github.com/Kkolyasik/gophermart/internal/handler/balance:
  github.com/Kkolyasik/gophermart/internal/handler/order:
  github.com/Kkolyasik/gophermart/internal/service/auth:
  github.com/Kkolyasik/gophermart/internal/service/balance:
  github.com/Kkolyasik/gophermart/internal/service/order:
  github.com/Kkolyasik/gophermart/internal/middleware/gin: